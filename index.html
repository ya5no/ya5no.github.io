<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ya5no</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #d0d0d0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2em;
      color: #ffffff;
      letter-spacing: 8px;
      margin-bottom: 8px;
    }
    .line {
      width: 40px;
      height: 1px;
      background: #444;
      margin: 24px 0;
    }
    p {
      font-size: 0.9em;
      line-height: 1.8;
      color: #888;
      margin-bottom: 16px;
    }
    .tags {
      margin-top: 32px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.75em;
      color: #444;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ya5no</h1>
    <div class="line"></div>
    <p>chess. code. pattern recognition.</p>
    <p>somewhere in russia.</p>
    <div class="tags">
      <span class="tag">♟ chess</span>
      <span class="tag">// code</span>
      <span class="tag">∴ logic</span>
    </div>
  </div>
</body>
</html>
